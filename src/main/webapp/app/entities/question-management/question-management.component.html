<div class="question-management-container">
  <h1>Question Management</h1>

  <!-- Button to create a new question -->
  <button class="btn btn-primary" (click)="createQuestion()">Create New Question</button>

  <!-- List of questions -->
  <div class="question-list">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Title</th>
          <th>Difficulty</th>
          <th>Language</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let question of questions">
          <td>{{ question.title }}</td>
          <td>{{ question.difficulty }}</td>
          <td>{{ question.language }}</td>
          <td>
            <button class="btn btn-warning" (click)="editQuestion(question)">Edit</button>
            <button class="btn btn-danger" (click)="deleteQuestion(question.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
